# These validations are for commits that change the organizational structure.

name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-editorconfig:
    name: Validate EditorConfig Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install EditorConfig Checker
        uses: taiki-e/install-action@v2
        with:
          tool: editorconfig-checker
          fallback: none

      - name: Validate EditorConfig Compliance
        run: editorconfig-checker --exclude ^LICENSE

  validate-toml:
    name: Validate TOML Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo
          fallback: none

      - name: Validate TOML Formatting
        run: taplo fmt --check

      - name: Validate TOML Against Schemas
        run: taplo check

  # Rules validation calls a hosted API (see meta/validator/src/server.py POST /validate).
  # The base URL is hardcoded so fork PRs can run this job without repository secrets.
  # The endpoint is therefore public in this repo; protect the service appropriately.
  validate-rules:
    name: Validate rules via API
    runs-on: ubuntu-latest
    env:
      VALIDATOR_SERVER_URL: https://goldador.scottylabs.org
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Resolve Git ref to validate
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate via validator server
        run: uv run --frozen --no-dev validate "${{ steps.meta.outputs.ref }}"
